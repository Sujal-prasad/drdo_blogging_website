<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midium — Home</title>

  <!-- Apply saved theme BEFORE paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      // hide protected content until auth.js confirms a session (safety release after 5s)
      document.documentElement.classList.add("auth-gate");
      // fail CLOSED: if auth never confirms within 7s, go to login instead of revealing
      setTimeout(function () {
        if (document.documentElement.classList.contains("auth-gate")) location.replace("/pages/login.html");
      }, 7000);
      var saved = localStorage.getItem("midium-theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
      // capture OAuth result BEFORE supabase strips it from the URL.
      var h = window.location.hash || "", q = window.location.search || "";
      window.__cameFromOAuth =
        h.indexOf("access_token") !== -1 || /[?&]code=/.test(q); // implicit OR pkce
      var em = h.match(/error_description=([^&]+)/) || q.match(/error_description=([^&]+)/);
      if (em) { try { sessionStorage.setItem("midium-oauth-error", decodeURIComponent(em[1].replace(/\+/g, " "))); } catch (e) {} }
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/app.css" />
</head>
<body>
  <header class="app-topbar">
    <a class="brand" href="/index.html">Midium<span class="dot">.</span></a>
    <div class="topbar-actions">
      <button class="btn btn--ghost" id="memberBtn" type="button" hidden></button>
      <a class="btn btn--accent" href="/pages/write.html">✍️ Write</a>
      <a class="btn btn--ghost" href="/pages/profile.html">👤 Profile</a>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode"></button>
      <button class="btn btn--ghost" id="signout" type="button">Sign out</button>
    </div>
  </header>

  <main class="container">
    <section class="feed-hero">
      <h1 id="greeting">Welcome back.</h1>
      <p>Thoughtful stories across technology, science, culture, and business — plus your own.</p>
    </section>

    <div class="feed-controls">
      <label class="search">
        🔍
        <input id="search" type="search" placeholder="Search titles, authors, topics…" />
      </label>
      <select id="sort" class="feed-sort" aria-label="Sort articles">
        <option value="new">Newest</option>
        <option value="claps">Most clapped</option>
        <option value="quick">Quickest read</option>
      </select>
    </div>

    <div class="chips" id="chips"></div>

    <div class="cards" id="cards"></div>
  </main>

  <div class="toast-stack" id="toastStack"></div>

  <!-- scripts -->
  <script src="/scripts/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/scripts/core/supabase-client.js"></script>
  <script src="/scripts/core/session.js"></script>
  <script src="/scripts/core/theme.js"></script>
  <script src="/scripts/core/ui.js"></script>
  <script src="/scripts/data/articles.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="/scripts/feed/paywall.js"></script>
  <script src="/scripts/feed/feed.js"></script>
</body>
</html>
