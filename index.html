<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Midium — Home</title>

  <!-- Apply saved theme BEFORE paint to avoid a flash of the wrong theme -->
  <script>
    (function () {
      var saved = localStorage.getItem("midium-theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
    })();
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>
  <header class="app-topbar">
    <a class="brand" href="index.html">Midium<span class="dot">.</span></a>
    <div class="topbar-actions">
      <a class="btn btn--accent" href="write.html">✍️ Write</a>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">🌙</button>
      <button class="btn btn--ghost" id="signout" type="button">Sign out</button>
    </div>
  </header>

  <main class="container">
    <section class="feed-hero">
      <h1 id="greeting">Welcome back.</h1>
      <p>Stories of precisely medium temperature — plus whatever you publish.</p>
    </section>

    <div class="feed-controls">
      <label class="search">
        🔍
        <input id="search" type="search" placeholder="Search titles, authors, nonsense…" />
      </label>
    </div>

    <div class="chips" id="chips"></div>

    <div class="cards" id="cards"></div>
  </main>

  <!-- scripts -->
  <script src="scripts/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/core/supabase-client.js"></script>
  <script src="scripts/core/session.js"></script>
  <script src="scripts/core/theme.js"></script>
  <script src="scripts/data/articles.js"></script>
  <script src="scripts/feed/feed.js"></script>
</body>
</html>
